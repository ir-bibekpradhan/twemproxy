name: CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - REDIS_VER: 3.0.7
          - REDIS_VER: 3.2.13
          - REDIS_VER: 4.0.14
          - REDIS_VER: 5.0.12
          - REDIS_VER: 6.2.4

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: |
          docker build \
            --build-arg REDIS_VER=${{ matrix.REDIS_VER }} \
            -t my-app:${{ matrix.REDIS_VER }} .

      - name: Build and test in docker
        run: bash ./test_in_docker.sh ${{ matrix.REDIS_VER }}
